# One-click baseline accept: add the `accept-screenshots` label to a PR and this
# regenerates test/screenshots/*.png on the branch and pushes them back, instead
# of comparing. Same reusable workflow as screenshots.yml, with accept: true.
#
# Create the `accept-screenshots` label once. Note (see the gleam-screenshots
# README): the accept job pushes with the default GITHUB_TOKEN, which does not
# re-trigger workflows, so re-run the regression check from the Actions tab
# afterwards to refresh its status.
name: screenshots-accept

on:
  pull_request:
    types: [labeled]

jobs:
  accept:
    if: github.event.label.name == 'accept-screenshots'
    permissions:
      contents: write # push the refreshed baselines
      pull-requests: write # drop the label afterwards
    uses: thomasdelva/gleam-screenshots/.github/workflows/screenshots.yml@claude/maplibre-screenshot-testing-vy3awu
    with:
      accept: true
      gleam-version: "1.17.0"
      build-command: gleam build --target javascript
      chrome-version: "141.0.7390.37"
      threshold: "0.2"
