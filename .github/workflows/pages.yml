name: Deploy demo to Pages

on:
  push:
    branches:
      # Build every branch so any push redeploys the demo, but never the
      # publishing branch itself (peaceiris pushes there, which would otherwise
      # trigger an endless loop).
      - "**"
      - "!gh-pages"
  workflow_dispatch:

# peaceiris/actions-gh-pages pushes the built site to the `gh-pages` branch
# using the default token, so it needs write access to repo contents.
permissions:
  contents: write

# A single live site, so serialise deploys across all branches: never run two
# at once, and let a newer run supersede an in-flight older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.17.0"

      - uses: oven-sh/setup-bun@v2

      - name: Compile the demo to JavaScript
        working-directory: demo
        run: |
          gleam deps download
          gleam build --target javascript

      - name: Bundle the demo
        working-directory: demo
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p ../_site
          # Lustre apps don't auto-run; the entry imports and calls `main`.
          printf "import { main } from './build/dev/javascript/demo/demo.mjs';\nmain();\n" > _entry.mjs
          bun build ./_entry.mjs --minify --outfile ../_site/demo.mjs
          cp index.html ../_site/index.html
          # Record which branch produced this deploy. index.html loads this to
          # show a badge; it's absent in local dev, where the badge reads
          # "local dev". Escape backslashes/quotes so any branch name is a valid
          # JS string literal.
          branch=${DEPLOY_BRANCH//\\/\\\\}
          branch=${branch//\"/\\\"}
          printf 'window.DEPLOY_BRANCH = "%s";\n' "$branch" > ../_site/deploy.js

      # force_orphan replaces the whole gh-pages branch with this build, so each
      # run overwrites the previous deploy (whatever branch produced it). The
      # live site always reflects the most recently pushed branch.
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
