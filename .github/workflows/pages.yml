name: Deploy demo to Pages

on:
  push:
    branches:
      # Build every branch so feature branches get a live preview, but never
      # the publishing branch itself (peaceiris pushes there, which would
      # otherwise trigger an endless loop).
      - "**"
      - "!gh-pages"
  workflow_dispatch:

# peaceiris/actions-gh-pages pushes the built site to the `gh-pages` branch
# using the default token, so it needs write access to repo contents.
permissions:
  contents: write

# Scope the concurrency group per ref so runs on different branches don't
# cancel each other; newer pushes to the same ref still supersede older ones.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.17.0"

      - uses: oven-sh/setup-bun@v2

      - name: Compile the demo to JavaScript
        working-directory: demo
        run: |
          gleam deps download
          gleam build --target javascript

      - name: Bundle the demo
        working-directory: demo
        run: |
          mkdir -p ../_site
          # Lustre apps don't auto-run; the entry imports and calls `main`.
          printf "import { main } from './build/dev/javascript/demo/demo.mjs';\nmain();\n" > _entry.mjs
          bun build ./_entry.mjs --minify --outfile ../_site/demo.mjs
          cp index.html ../_site/index.html

      # main → site root; every other branch → previews/<branch>/. Branch names
      # with slashes (e.g. claude/foo) just become nested folders, which is fine
      # because the demo's asset paths are relative.
      - name: Choose the publish destination
        id: dest
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "dir=previews/${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      # keep_files keeps everything already on gh-pages (the root build and any
      # other branches' previews) and only overwrites this destination's files.
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true
