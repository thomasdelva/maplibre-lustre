name: Deploy demo to Pages

on:
  # Deploy on pushes to main, on PRs carrying the `test-deploy` label (enforced
  # by the build job's `if` below), and on manual dispatch.
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch:

# Permissions the official Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live site, so serialise deploys. cancel-in-progress is false (the Pages
# recommendation) so an in-flight deployment is allowed to finish rather than
# being interrupted; queued runs then deploy in order, last one winning.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # push (main) and workflow_dispatch always run; a pull_request only deploys
    # when it carries the `test-deploy` label.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'test-deploy')
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.17.0"

      - uses: oven-sh/setup-bun@v2

      - name: Compile the demo to JavaScript
        working-directory: demo
        run: |
          gleam deps download
          gleam build --target javascript

      - name: Bundle the demo
        working-directory: demo
        env:
          # On pull_request, github.ref_name is "<n>/merge"; head_ref is the
          # actual source branch. On push/dispatch head_ref is empty, so fall
          # back to ref_name.
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          mkdir -p ../_site
          # Lustre apps don't auto-run; the entry imports and calls `main`.
          printf "import { main } from './build/dev/javascript/demo/demo.mjs';\nmain();\n" > _entry.mjs
          bun build ./_entry.mjs --minify --outfile ../_site/demo.mjs
          cp index.html ../_site/index.html
          # Record which branch produced this deploy. index.html loads this to
          # show a badge; it's absent in local dev, where the badge reads
          # "local dev". Escape backslashes/quotes so any branch name is a valid
          # JS string literal.
          branch=${DEPLOY_BRANCH//\\/\\\\}
          branch=${branch//\"/\\\"}
          printf 'window.DEPLOY_BRANCH = "%s";\n' "$branch" > ../_site/deploy.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # A single deployment that each run overwrites, so the live site always
  # reflects the most recently pushed branch.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
