name: CI

# One workflow: build-verify the library + demo, run the full test suite
# (including the live-map screenshot regression, which needs a browser), and
# conditionally publish the demo to GitHub Pages. The local Claude Code
# containers can't reach repo.hex.pm (see CLAUDE.md), so CI is the canonical
# place the Gleam build is checked.
on:
  push:
  pull_request:
    # `labeled` so adding `accept-screenshots` triggers an accept run.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

jobs:
  build:
    # Build + verify the library and demo, then run the whole suite — the pure
    # reconciler tests and the screenshot regression (the latter needs a browser,
    # so this job installs chrome-headless-shell and points CHROME_BIN at it).
    runs-on: ubuntu-latest
    permissions:
      contents: write # accept mode pushes the refreshed baselines
    env:
      # Accept mode (refresh baselines) whenever the label is on the PR; null-safe
      # on push/dispatch (no pull_request payload), so a plain run only compares.
      SCREENSHOT_ACCEPT: ${{ contains(github.event.pull_request.labels.*.name, 'accept-screenshots') }}
      ODIFF_BIN: node_modules/.bin/odiff
    steps:
      - uses: actions/checkout@v4
        with:
          # Head branch (not the merge commit), so accept mode can push back to it.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.17.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # JS peers: maplibre-gl (the harness loads it) + odiff-bin (the diff).
      - run: npm ci

      - name: Build the library (JavaScript target)
        run: |
          gleam deps download
          gleam build --target javascript

      # chrome-headless-shell renders an exact viewport (no letterbox band). It's
      # a separate download from full Chrome; its install line ends with the path.
      # Pin the build the baselines were generated against (SwiftShader is
      # deterministic per build).
      - name: Install chrome-headless-shell
        id: chrome
        run: |
          line=$(npx -y @puppeteer/browsers install "chrome-headless-shell@141.0.7390.37")
          echo "path=${line##* }" >> "$GITHUB_OUTPUT"

      - name: Test the library
        # The pure marker reconciler plus the live `<maplibre-map>` screenshot
        # regression (test/maplibre_screenshot_test.gleam) — CHROME_BIN/ODIFF_BIN
        # are set, so the screenshot tests run rather than skip.
        run: gleam test
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.path }}

      - name: Build the demo (JavaScript target)
        working-directory: demo
        run: |
          gleam deps download
          gleam build --target javascript

      - name: Check formatting (library + demo)
        if: ${{ always() }}
        run: gleam format --check src demo/src

      - name: Commit accepted baselines
        if: ${{ success() && env.SCREENSHOT_ACCEPT == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- test/screenshots
          if ! git diff --cached --quiet; then
            git commit -m "Accept updated screenshots"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Upload proposed screenshots and diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-proposals
          path: |
            **/*.new.png
            **/*.diff.png
          if-no-files-found: ignore
          retention-days: 14

  publish:
    # Conditional publish to the single live Pages site: pushes to main, or a
    # manual workflow_dispatch (run it on a branch to preview that branch). A
    # bare `on: push:` fires for every branch, so the ref==main check is what
    # keeps feature-branch pushes from publishing.
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # One live site; each new run supersedes any older one still in flight.
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.17.0"

      - uses: oven-sh/setup-bun@v2

      - name: Compile the demo to JavaScript
        working-directory: demo
        run: |
          gleam deps download
          gleam build --target javascript

      - name: Bundle the demo
        working-directory: demo
        env:
          # publish only runs on push(main)/dispatch, so ref_name is the branch.
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p ../_site
          # Lustre apps don't auto-run; the entry imports and calls `main`.
          printf "import { main } from './build/dev/javascript/demo/demo.mjs';\nmain();\n" > _entry.mjs
          bun build ./_entry.mjs --minify --outfile ../_site/demo.mjs
          cp index.html ../_site/index.html
          # Record which branch produced this deploy. index.html loads this to
          # show a badge; it's absent in local dev, where the badge reads
          # "local dev". Escape backslashes/quotes so any branch name is a valid
          # JS string literal.
          branch=${DEPLOY_BRANCH//\\/\\\\}
          branch=${branch//\"/\\\"}
          printf 'window.DEPLOY_BRANCH = "%s";\n' "$branch" > ../_site/deploy.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
